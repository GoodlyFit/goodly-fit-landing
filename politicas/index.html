<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Politicas de privacidad</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --paper: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --accent: #2254d6;
      --accent-soft: #e8efff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(34, 84, 214, 0.12), transparent 30rem),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }

    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: clamp(32px, 7vw, 72px) 0;
    }

    .shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--paper);
      box-shadow: 0 24px 80px rgba(23, 32, 51, 0.10);
    }

    header,
    section,
    footer {
      padding: clamp(26px, 5vw, 52px);
    }

    header {
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(34, 84, 214, 0.10), rgba(34, 84, 214, 0));
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .mark {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 7px var(--accent-soft);
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 1rem;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }

    footer {
      border-top: 1px solid var(--line);
      background: #fbfcff;
    }
  </style>
</head>
<body>
  <main>
    <article class="shell">
      <header>
        <div class="label"><span class="mark"></span> Documentos legales</div>
        <h1>Politicas de privacidad</h1>
        <p>Indice neutro para documentos legales de aplicaciones de marca blanca.</p>
      </header>
      <section>
        <p>Los documentos especificos se publican por cliente usando el formato:</p>
        <p><a href="/politicas/icono/">/politicas/icono/</a></p>
      </section>
      <footer>
        <p>Esta pagina no esta enlazada desde la landing y no debe indexarse en buscadores.</p>
      </footer>
    </article>
  </main>
</body>
</html>
